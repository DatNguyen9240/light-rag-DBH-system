<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightRAG Admin - RABC Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        /* Forms */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="text"],
        textarea {
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border 0.2s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        .roles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .role-chip {
            background-color: #E0E7FF;
            color: #3730A3;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .role-chip.selected {
            background-color: var(--primary);
            color: white;
        }

        /* Document List */
        .doc-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .doc-item {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .doc-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .doc-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            cursor: pointer;
            width: 100%;
        }

        .doc-filename {
            font-weight: 600;
            color: var(--primary);
        }

        .doc-roles {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Alert */
        .status-bar {
            padding: 1rem;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .status-success {
            background-color: #D1FAE5;
            color: #065F46;
            display: block;
        }

        .status-error {
            background-color: #FEE2E2;
            color: #991B1B;
            display: block;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h1>Quản trị Knowledge Base (LightRAG)</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Cập nhật tài liệu & Phân quyền trực tiếp tốc độ cao
            </p>
        </div>
        <button id="btnReindex" class="btn btn-primary" style="background-color: #10B981;">
            <div id="reindexLoader" class="loader"></div>
            ⚡ Áp dụng & Reindex
        </button>
    </header>

    <div id="statusBar" class="status-bar"></div>

    <div class="dashboard">
        <!-- Panel 1: Document Editor -->
        <div class="card">
            <div class="card-title" id="editorTitle">Thêm tài liệu mới</div>
            <div class="form-group">
                <label>Tên File (.md)</label>
                <input type="text" id="filename" placeholder="VD: chinh_sach_vien_phi.md">
            </div>

            <div class="form-group">
                <label>Phân quyền (Roles) cho phép xem:</label>
                <div class="roles-container" id="rolesContainer">
                    <div class="role-chip" data-role="admin">Admin</div>
                    <div class="role-chip selected" data-role="patient">Patient</div>
                    <div class="role-chip" data-role="doctor">Doctor</div>
                    <div class="role-chip" data-role="staff">Staff</div>
                </div>
            </div>

            <div class="form-group">
                <label>Nội dung tài liệu:</label>
                <textarea id="content" placeholder="Nhập nội dung markdown tại đây..."></textarea>
            </div>

            <button id="btnSave" class="btn btn-primary" style="justify-content: center; margin-top: 1rem;">💾 Lưu Tài
                Liệu</button>
        </div>

        <!-- Panel 2: Document List -->
        <div class="card">
            <div class="card-title">Danh sách tài liệu hiện tại</div>
            <div class="doc-list" id="docList">
                <!-- Data injected here -->
                <p style="color: var(--text-muted); text-align: center; padding: 2rem;">Đang tải danh sách...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://192.168.68.118:9621/api/kb";

        let documents = [];
        const statusBar = document.getElementById('statusBar');

        // Toggle Roles
        document.querySelectorAll('.role-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('selected');
            });
        });

        function getSelectedRoles() {
            return Array.from(document.querySelectorAll('.role-chip.selected'))
                .map(chip => chip.getAttribute('data-role'));
        }

        function setSelectedRoles(roles) {
            document.querySelectorAll('.role-chip').forEach(chip => {
                const role = chip.getAttribute('data-role');
                if (roles.includes(role)) {
                    chip.classList.add('selected');
                } else {
                    chip.classList.remove('selected');
                }
            });
        }

        function showStatus(msg, isError = false) {
            statusBar.textContent = msg;
            statusBar.className = 'status-bar ' + (isError ? 'status-error' : 'status-success');
            setTimeout(() => { statusBar.style.display = 'none'; }, 4000);
        }

        async function fetchDocuments() {
            try {
                const res = await fetch(`${API_BASE}/documents`);
                documents = await res.json();
                renderDocList();
            } catch (err) {
                showStatus("Lỗi kết nối tới Server. Hãy chắc chắn Server LightRAG (port 9621) đang chạy.", true);
            }
        }

        function renderDocList() {
            const list = document.getElementById('docList');
            list.innerHTML = "";
            if (documents.length === 0) {
                list.innerHTML = '<p style="color: grey; text-align: center;">Chưa có tài liệu nào.</p>';
                return;
            }

            documents.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'doc-item';
                item.innerHTML = `
                    <div class="doc-info" onclick="loadDoc('${doc.filename}')">
                        <div class="doc-filename">📄 ${doc.filename}</div>
                        <div class="doc-roles">Quyền: <b>${doc.roles.join(', ')}</b> | Size: ${(doc.sizeBytes / 1024).toFixed(1)} KB</div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteDoc('${doc.filename}')">Xóa</button>
                `;
                list.appendChild(item);
            });
        }

        function loadDoc(filename) {
            const doc = documents.find(d => d.filename === filename);
            if (!doc) return;
            document.getElementById('filename').value = doc.filename;
            document.getElementById('content').value = doc.content;
            setSelectedRoles(doc.roles);
            document.getElementById('editorTitle').textContent = `Chỉnh sửa: ${filename}`;
        }

        document.getElementById('btnSave').addEventListener('click', async () => {
            let filename = document.getElementById('filename').value.trim();
            const content = document.getElementById('content').value.trim();
            const roles = getSelectedRoles();

            if (!filename || !content) {
                showStatus('Vui lòng nhập Tên file và Nội dung!', true);
                return;
            }
            if (!filename.endsWith('.md')) filename += '.md';
            if (roles.length === 0) {
                showStatus('Vui lòng chọn ít nhất 1 quyền (Role)!', true);
                return;
            }

            try {
                await fetch(`${API_BASE}/documents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, content, roles })
                });
                showStatus('✅ Đã lưu tài liệu. (Nhớ bấm nút Áp dụng & Reindex để cập nhật vào Chatbot!)');

                // Clear UI
                document.getElementById('filename').value = '';
                document.getElementById('content').value = '';
                document.getElementById('editorTitle').textContent = 'Thêm tài liệu mới';

                await fetchDocuments();
            } catch (err) {
                showStatus('Lỗi khi lưu tài liệu: ' + err.message, true);
            }
        });

        window.deleteDoc = async (filename) => {
            if (!confirm(`Bạn có chắc chắn muốn xóa file ${filename}?`)) return;
            try {
                await fetch(`${API_BASE}/documents/${filename}`, { method: 'DELETE' });
                showStatus(`✅ Đã xóa ${filename}`);
                await fetchDocuments();
            } catch (err) {
                showStatus('Lỗi khi xóa: ' + err.message, true);
            }
        };

        // Reindex Trigger
        document.getElementById('btnReindex').addEventListener('click', async () => {
            const btn = document.getElementById('btnReindex');
            const loader = document.getElementById('reindexLoader');
            btn.disabled = true;
            loader.style.display = 'inline-block';
            try {
                const res = await fetch(`${API_BASE}/reindex`, { method: 'POST' });
                const data = await res.json();
                showStatus('🚀 ' + (data.message || 'Hệ thống đang chạy ngầm...'));
            } catch (err) {
                showStatus('Lỗi Reindex: ' + err.message, true);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });

        // Init
        fetchDocuments();
    </script>
</body>

</html>
